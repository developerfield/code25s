
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ortalama Matrisi</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #1e1e2e;
            --accent: #7c6af7;
            --accent2: #e96479;
            --text: #e8e8f0;
            --muted: #555570;
            --highlight: #ffd060;
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Grid bg */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 960px;
        }

        header {
            margin-bottom: 40px;
            text-align: left;
        }

        .tag {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 4px 12px;
            border-radius: 2px;
            margin-bottom: 16px;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(28px, 5vw, 52px);
            font-weight: 800;
            line-height: 1.05;
            color: var(--text);
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            margin-top: 10px;
            color: var(--muted);
            font-size: 13px;
        }

        /* Controls */
        .controls {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 32px;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 16px;
            align-items: end;
        }

        @media (max-width: 640px) {
            .controls { grid-template-columns: 1fr; }
        }

        .field label {
            display: block;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .field input,
        .field select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus,
        .field select:focus {
            border-color: var(--accent);
        }

        .field select option { background: #1a1a2e; }

        .run-btn {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.05em;
            padding: 11px 28px;
            border-radius: 6px;
            transition: transform 0.15s, background 0.2s;
            white-space: nowrap;
        }

        .run-btn:hover { background: #9b8dff; transform: translateY(-1px); }
        .run-btn:active { transform: translateY(0); }

        /* Method badge */
        .method-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            color: var(--muted);
        }

        .method-badge {
            background: rgba(124,106,247,0.15);
            color: var(--accent);
            border: 1px solid rgba(124,106,247,0.3);
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 11px;
            letter-spacing: 0.1em;
        }

        /* Table */
        .table-wrap {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: var(--surface);
        }

        thead tr th {
            background: #0d0d16;
            color: var(--muted);
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 400;
            white-space: nowrap;
        }

        thead tr th:first-child {
            color: var(--accent);
            font-weight: 500;
        }

        tbody tr td {
            padding: 11px 16px;
            font-size: 13px;
            border-bottom: 1px solid rgba(30,30,46,0.6);
            border-right: 1px solid rgba(30,30,46,0.4);
            text-align: center;
            transition: background 0.15s;
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: rgba(255,255,255,0.025); }

        td.empty { color: #252535; }
        td.diagonal { color: var(--accent2); font-weight: 500; }
        td.top-right {
            background: rgba(255,208,96,0.1);
            color: var(--highlight);
            font-weight: 700;
            position: relative;
        }
        td.top-right::after {
            content: '★';
            position: absolute;
            top: 3px;
            right: 4px;
            font-size: 7px;
            color: var(--highlight);
            opacity: 0.6;
        }

        /* Row header */
        td.row-label {
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 0.08em;
            background: #0d0d16;
            text-align: left;
            border-right: 1px solid var(--border);
            white-space: nowrap;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            color: var(--muted);
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
        }

        .dot.d { background: var(--accent2); }
        .dot.h { background: var(--highlight); }
        .dot.e { background: #252535; border: 1px solid #333; }

        /* Animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        tbody tr {
            animation: fadeUp 0.3s ease both;
        }

        tbody tr:nth-child(1) { animation-delay: 0.05s }
        tbody tr:nth-child(2) { animation-delay: 0.1s }
        tbody tr:nth-child(3) { animation-delay: 0.15s }
        tbody tr:nth-child(4) { animation-delay: 0.2s }
        tbody tr:nth-child(5) { animation-delay: 0.25s }
    </style>
</head>
<body>
<div class="wrapper">
    <header>
        <div class="tag">İstatistiksel Araç</div>
        <h1>Ortalama <span>Matrisi</span></h1>
        <p class="subtitle">Alt diziler üzerinde seçilen yöntemle hesaplanmış ortalama tablosu</p>
    </header>

    <div class="controls">
        <div class="field">
            <label>Sayı Serisi</label>
            <input type="text" id="numArray" value="1, 10, 20, 30, 50" placeholder="Virgülle ayırın…">
        </div>
        <div class="field">
            <label>Ortalama Yöntemi</label>
            <select id="methodSelect">
                <optgroup label="Klasik">
                    <option value="aritmetik">Aritmetik</option>
                    <option value="geometrik">Geometrik</option>
                    <option value="harmonik">Harmonik</option>
                    <option value="rms">RMS (Karesel)</option>
                    <option value="kubik">Kübik</option>
                </optgroup>
                <optgroup label="İleri Seviye">
                    <option value="holder">Hölder (p=3)</option>
                    <option value="lehmer">Lehmer (p=2)</option>
                    <option value="heronian">Heronian</option>
                    <option value="identric">Identric</option>
                </optgroup>
                <optgroup label="Robust">
                    <option value="trimmed">Budanmış (%20)</option>
                    <option value="winsorize">Winsorize (%20)</option>
                </optgroup>
            </select>
        </div>
        <button class="run-btn" onclick="generateMatrix()">▶ Analiz Et</button>
    </div>

    <div id="output"></div>

    <div class="legend">
        <div class="legend-item"><div class="dot d"></div> Köşegen (tek eleman)</div>
        <div class="legend-item"><div class="dot h"></div> Tam dizi ortalaması</div>
        <div class="legend-item"><div class="dot e"></div> Boş (geçersiz alt dizi)</div>
    </div>
</div>

<script>
    const METHOD_NAMES = {
        aritmetik: 'Aritmetik', geometrik: 'Geometrik', harmonik: 'Harmonik',
        rms: 'RMS', kubik: 'Kübik', holder: 'Hölder p=3', lehmer: 'Lehmer p=2',
        heronian: 'Heronian', identric: 'Identric', trimmed: 'Budanmış %20', winsorize: 'Winsorize %20'
    };

    function calculateAverage(subset, method) {
        const n = subset.length;
        if (n === 0) return 0;
        const sorted = [...subset].sort((a, b) => a - b);

        switch (method) {
            case 'aritmetik': return subset.reduce((a, b) => a + b, 0) / n;
            case 'geometrik': return Math.pow(subset.reduce((a, b) => a * b, 1), 1 / n);
            case 'harmonik': return n / subset.reduce((a, b) => a + (1 / (b || 1e-9)), 0);
            case 'rms': return Math.sqrt(subset.reduce((a, b) => a + b * b, 0) / n);
            case 'kubik': return Math.pow(subset.reduce((a, b) => a + Math.pow(b, 3), 0) / n, 1 / 3);
            case 'holder': return Math.pow(subset.reduce((a, b) => a + Math.pow(b, 3), 0) / n, 1 / 3);
            case 'lehmer': {
                const num = subset.reduce((a, b) => a + b * b, 0);
                const den = subset.reduce((a, b) => a + b, 0);
                return num / (den || 1);
            }
            case 'heronian': {
                if (n < 2) return subset[0];
                const sumSqrt = subset.reduce((a, b, i) => a + (i < n - 1 ? Math.sqrt(subset[i] * subset[i + 1]) : 0), 0);
                return (subset.reduce((a, b) => a + b, 0) + sumSqrt) / (n + (n - 1));
            }
            case 'identric': {
                if (n === 1) return subset[0];
                const a = sorted[0], b = sorted[n - 1];
                if (a === b) return a;
                return (1 / Math.E) * Math.pow(Math.pow(b, b) / Math.pow(a, a), 1 / (b - a));
            }
            case 'trimmed': {
                const tc = Math.floor(n * 0.2);
                const trimmed = sorted.slice(tc, n - tc);
                return trimmed.length === 0 ? sorted[0] : trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
            }
            case 'winsorize': {
                const wc = Math.floor(n * 0.2);
                if (n < 3) return subset.reduce((a, b) => a + b, 0) / n;
                const lo = sorted[wc], hi = sorted[n - 1 - wc];
                const wins = sorted.map(x => x < lo ? lo : (x > hi ? hi : x));
                return wins.reduce((a, b) => a + b, 0) / n;
            }
            default: return 0;
        }
    }

    function fmt(v) {
        if (isNaN(v) || !isFinite(v)) return '—';
        return v % 1 === 0 ? v.toString() : v.toFixed(2);
    }

    function generateMatrix() {
        const raw = document.getElementById('numArray').value;
        const method = document.getElementById('methodSelect').value;
        const arr = raw.split(',').map(s => parseFloat(s.trim())).filter(s => !isNaN(s));
        const n = arr.length;
        const out = document.getElementById('output');
        if (n === 0) { out.innerHTML = ''; return; }

        let html = `<div class="method-info">
            <span>Yöntem:</span>
            <span class="method-badge">${METHOD_NAMES[method] || method}</span>
            <span>· ${n} eleman</span>
        </div>
        <div class="table-wrap"><table>
        <thead><tr><th>Adım</th>`;

        for (let j = 0; j < n; j++) {
            html += `<th>${arr[j]}</th>`;
        }
        html += '</tr></thead><tbody>';

        for (let i = 0; i < n; i++) {
            html += `<tr><td class="row-label">k=${i + 1}</td>`;
            for (let j = 0; j < n; j++) {
                if (j < i) {
                    html += `<td class="empty">·</td>`;
                } else {
                    const subset = arr.slice(j - i, j + 1);
                    const avg = calculateAverage(subset, method);
                    let cls = '';
                    if (i === 0) cls = 'diagonal';
                    if (i === 0 && j === n - 1) cls = 'top-right';
                    html += `<td class="${cls}">${fmt(avg)}</td>`;
                }
            }
            html += '</tr>';
        }

        html += '</tbody></table></div>';
        out.innerHTML = html;
    }

    window.onload = generateMatrix;
</script>
</body>
</html>
