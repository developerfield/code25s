<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yeniAX</title>
<script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a8a;
    --text: #e8e8f0;
    --muted: #5a5a7a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  .app-title {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
    font-family: 'Space Mono', monospace;
  }

  /* DATE NAV */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    width: 100%;
    max-width: 420px;
  }

  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--accent); border-color: var(--accent); }

  .date-center {
    flex: 1;
    text-align: center;
    cursor: pointer;
  }
  .date-display {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .day-display {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .cal-popup-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }
  .cal-popup-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* GRID */
  .grid-section {
    width: 100%; max-width: 420px;
    margin-bottom: 16px;
  }

  .grid-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
  }

  .selected-preview {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 10px;
    min-height: 16px;
  }
  .selected-preview span { font-weight: 700; }

  .btn-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .val-btn {
    aspect-ratio: 1;
    border-radius: 12px;
    border: 2px solid transparent;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    transition: all .15s;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }
  .val-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.22);
    transition: background .15s;
    pointer-events: none;
  }
  .val-btn span { position: relative; z-index: 1; }
  .val-btn:hover { transform: scale(1.05); }
  .val-btn:hover::before { background: rgba(0,0,0,0.05); }
  .val-btn.selected { border-color: rgba(255,255,255,0.8); transform: scale(1.07); box-shadow: 0 0 16px rgba(255,255,255,0.25); }
  .val-btn.selected::before { background: rgba(0,0,0,0.0); }

  /* SAVE */
  .save-btn {
    width: 100%; max-width: 420px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .15s;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .save-btn:hover { background: #9580ff; transform: translateY(-1px); }
  .save-btn:active { transform: translateY(0); }
  .save-btn.saving { opacity: .6; pointer-events: none; }
  .save-status {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #22c55e;
    opacity: 0;
    transition: opacity .3s;
    font-size: 13px;
  }
  .save-btn.saved .save-status { opacity: 1; }

  /* DATA CALENDAR */
  .data-cal {
    width: 100%; max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }

  .cal-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .cal-tab {
    flex: 1;
    padding: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
  }
  .cal-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .cal-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cal-period { font-size: 13px; font-weight: 700; letter-spacing: 1px; }

  /* Day view */
  .daily-view { text-align: center; padding: 16px 0; }
  .daily-val {
    font-size: 52px;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    letter-spacing: 4px;
    min-height: 64px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Month view */
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .month-dow {
    text-align: center;
    font-size: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    padding-bottom: 4px;
  }
  .month-cell {
    aspect-ratio: 1;
    border-radius: 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
  }
  .month-cell.empty { background: transparent; }
  .month-cell.today { box-shadow: 0 0 0 1px var(--accent); }
  .cell-day { font-size: 8px; color: var(--muted); line-height: 1; }
  .month-cell.has-val .cell-day { color: rgba(255,255,255,0.5); }
  .cell-val { font-size: 8px; font-family: 'Space Mono', monospace; font-weight: 700; line-height: 1; margin-top: 1px; }

  /* Year view */
  .year-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .year-month { background: var(--surface2); border-radius: 8px; padding: 8px; }
  .year-month-name {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-align: center;
  }
  .year-month-dots { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; }
  .ym-dot { width: 6px; height: 6px; border-radius: 1px; background: var(--surface); }
  .ym-dot.empty-day { opacity: 0.25; }

  /* POPUP */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .popup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    width: 320px;
    max-width: 95vw;
  }
  .popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .popup-title {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }
  .popup-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .popup-close:hover { color: var(--accent2); border-color: var(--accent2); }
  .popup-cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .popup-period { font-size: 14px; font-weight: 700; }
  .popup-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: all .15s;
  }
  .popup-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .popup-month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .popup-dow {
    text-align: center;
    font-size: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    padding-bottom: 3px;
  }
  .popup-cell {
    aspect-ratio: 1;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    cursor: pointer;
    background: var(--surface2);
    transition: all .12s;
    font-family: 'Space Mono', monospace;
  }
  .popup-cell.empty { background: transparent; cursor: default; }
  .popup-cell:not(.empty):hover { background: var(--accent); color: #fff; }
  .popup-cell.selected { background: var(--accent); color: #fff; }
  .popup-cell.today { box-shadow: 0 0 0 1px var(--accent2); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    transition: transform .3s;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: #22c55e; color: #22c55e; }
  .toast.err { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>

<p class="app-title">yeniAX · veri girişi</p>

<!-- DATE NAV -->
<div class="date-nav">
  <button class="nav-btn" id="prevDay">‹</button>
  <div class="date-center" id="openPopupBtn">
    <div class="date-display" id="dateDisplay">—</div>
    <div class="day-display" id="dayDisplay">—</div>
  </div>
  <button class="cal-popup-btn" id="calPopupBtn">⊞</button>
  <button class="nav-btn" id="nextDay">›</button>
</div>

<!-- GRID -->
<div class="grid-section">
  <div class="grid-label">değer seç</div>
  <div class="selected-preview" id="selPreview">seçili: <span>—</span></div>
  <div class="btn-grid" id="btnGrid"></div>
</div>

<!-- SAVE -->
<button class="save-btn" id="saveBtn">
  <span>Seçili Güne Kaydet</span>
  <span class="save-status">✓ Kaydedildi</span>
</button>

<!-- DATA CALENDAR -->
<div class="data-cal">
  <div class="cal-tabs">
    <div class="cal-tab active" data-mode="day">GÜN</div>
    <div class="cal-tab" data-mode="month">AY</div>
    <div class="cal-tab" data-mode="year">YIL</div>
  </div>
  <div class="cal-nav">
    <button class="cal-nav-btn" id="calPrev">‹</button>
    <div class="cal-period" id="calPeriod">—</div>
    <button class="cal-nav-btn" id="calNext">›</button>
  </div>
  <div id="calContent"></div>
</div>

<!-- POPUP CALENDAR -->
<div class="overlay" id="popupOverlay">
  <div class="popup">
    <div class="popup-header">
      <div class="popup-title">tarih seç</div>
      <button class="popup-close" id="popupClose">✕</button>
    </div>
    <div class="popup-cal-nav">
      <button class="popup-nav-btn" id="ppPrev">‹</button>
      <div class="popup-period" id="ppPeriod">—</div>
      <button class="popup-nav-btn" id="ppNext">›</button>
    </div>
    <div class="popup-month-grid" id="ppGrid"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAIGzwmEB9F7K7KQzsEU5etVWejZ3oSluc",
    authDomain: "paralayici.firebaseapp.com",
    projectId: "paralayici",
    storageBucket: "paralayici.firebasestorage.app",
    messagingSenderId: "980843550614",
    appId: "1:980843550614:web:93dd5bda4ddc377b20efb7"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const COL = "yeniAX";

  const DAYS_TR  = ["Paz","Pzt","Sal","Çar","Per","Cum","Cmt"];
  const DAYS_FULL = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
  const MONTHS_TR = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

  // 3x3 grid sırası: soldan sağa C→B→A, yukarıdan aşağı 1→2→3
  // Satır 1 (üst, aydınlık): C1 B1 A1
  // Satır 2 (orta):           C2 B2 A2
  // Satır 3 (alt, karanlık):  C3 B3 A3
  // A1=sağ üst=yeşil, C3=sol alt=kırmızı, geçiş yeşil→sarı→turuncu→kırmızı
  const VALUES = ["C1","B1","A1","C2","B2","A2","C3","B3","A3"];
  const COLOR_MAP = {
    // Satır 1 — en aydınlık, yeşilden sola kırmızıya
    A1:"#4ade80",  // sağ üst — canlı yeşil
    B1:"#a3e635",  // orta üst — sarı-yeşil
    C1:"#facc15",  // sol üst  — sarı
    // Satır 2 — orta parlaklık
    A2:"#34d399",  // sağ orta — mint yeşil (biraz daha koyu)
    B2:"#fb923c",  // orta     — turuncu
    C2:"#f97316",  // sol orta — koyu turuncu
    // Satır 3 — en karanlık, kırmızı tonu
    A3:"#16a34a",  // sağ alt  — koyu yeşil
    B3:"#dc2626",  // orta alt — kırmızı
    C3:"#991b1b",  // sol alt  — koyu kırmızı
  };

  let selectedDate = new Date();
  let selectedVal  = null;
  let calMode = "day";
  let calDate = new Date();
  let ppDate  = new Date();
  let cache   = {};

  function dateKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  // Build buttons
  const btnGrid = document.getElementById("btnGrid");
  VALUES.forEach(v => {
    const btn = document.createElement("button");
    btn.className = "val-btn";
    btn.id = "vbtn-"+v;
    btn.dataset.val = v;
    btn.style.background = COLOR_MAP[v];
    btn.style.color = "#fff";
    const label = document.createElement("span");
    label.textContent = v;
    btn.appendChild(label);
    btn.addEventListener("click", () => selectVal(v));
    btnGrid.appendChild(btn);
  });

  function selectVal(v) {
    selectedVal = v;
    document.querySelectorAll(".val-btn").forEach(b => b.classList.remove("selected"));
    document.getElementById("vbtn-"+v).classList.add("selected");
    document.getElementById("selPreview").innerHTML =
      `seçili: <span style="color:${COLOR_MAP[v]}">${v}</span>`;
  }

  function clearSel() {
    selectedVal = null;
    document.querySelectorAll(".val-btn").forEach(b => b.classList.remove("selected"));
    document.getElementById("selPreview").innerHTML = `seçili: <span>—</span>`;
  }

  // Date nav
  function updateDateNav() {
    document.getElementById("dateDisplay").textContent =
      `${selectedDate.getDate()} ${MONTHS_TR[selectedDate.getMonth()]} ${selectedDate.getFullYear()}`;
    document.getElementById("dayDisplay").textContent =
      DAYS_FULL[selectedDate.getDay()].toUpperCase();
    const k = dateKey(selectedDate);
    loadVal(k, v => v ? selectVal(v) : clearSel());
  }

  document.getElementById("prevDay").addEventListener("click", () => {
    selectedDate.setDate(selectedDate.getDate()-1);
    updateDateNav();
  });
  document.getElementById("nextDay").addEventListener("click", () => {
    selectedDate.setDate(selectedDate.getDate()+1);
    updateDateNav();
  });

  // Firebase load
  function loadVal(k, cb) {
    if(cache[k] !== undefined) { cb(cache[k]); return; }
    db.collection(COL).doc(k).get()
      .then(doc => { cache[k] = doc.exists ? doc.data().v : null; cb(cache[k]); })
      .catch(() => { cache[k] = null; cb(null); });
  }

  // Save
  document.getElementById("saveBtn").addEventListener("click", async () => {
    if(!selectedVal) { showToast("Önce bir değer seç", "err"); return; }
    const k = dateKey(selectedDate);
    const btn = document.getElementById("saveBtn");
    btn.classList.add("saving");
    try {
      await db.collection(COL).doc(k).set({v: selectedVal});
      cache[k] = selectedVal;
      btn.classList.remove("saving");
      btn.classList.add("saved");
      setTimeout(() => btn.classList.remove("saved"), 1800);
      showToast(`${k} → ${selectedVal}`, "ok");
      refreshCal();
    } catch(e) {
      btn.classList.remove("saving");
      showToast("Hata: "+e.message, "err");
    }
  });

  // Toast
  function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show "+(type||"");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  // Calendar tabs
  document.querySelectorAll(".cal-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".cal-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      calMode = tab.dataset.mode;
      calDate = new Date(selectedDate);
      refreshCal();
    });
  });

  document.getElementById("calPrev").addEventListener("click", () => {
    if(calMode==="day") calDate.setDate(calDate.getDate()-1);
    else if(calMode==="month") calDate.setMonth(calDate.getMonth()-1);
    else calDate.setFullYear(calDate.getFullYear()-1);
    refreshCal();
  });
  document.getElementById("calNext").addEventListener("click", () => {
    if(calMode==="day") calDate.setDate(calDate.getDate()+1);
    else if(calMode==="month") calDate.setMonth(calDate.getMonth()+1);
    else calDate.setFullYear(calDate.getFullYear()+1);
    refreshCal();
  });

  function refreshCal() {
    if(calMode==="day") renderDayView();
    else if(calMode==="month") renderMonthView();
    else renderYearView();
  }

  function renderDayView() {
    document.getElementById("calPeriod").textContent =
      `${calDate.getDate()} ${MONTHS_TR[calDate.getMonth()]} ${calDate.getFullYear()}`;
    loadVal(dateKey(calDate), v => {
      const c = document.getElementById("calContent");
      c.innerHTML = "";
      const dv = document.createElement("div");
      dv.className = "daily-view";
      const vEl = document.createElement("div");
      vEl.className = "daily-val";
      if(v) {
        vEl.textContent = v;
        vEl.style.color = COLOR_MAP[v];
      } else {
        vEl.innerHTML = `<span style="color:var(--muted);font-size:18px;letter-spacing:2px">veri yok</span>`;
      }
      dv.appendChild(vEl);
      c.appendChild(dv);
    });
  }

  function renderMonthView() {
    const y = calDate.getFullYear(), m = calDate.getMonth();
    document.getElementById("calPeriod").textContent = `${MONTHS_TR[m]} ${y}`;
    const daysInMonth = new Date(y,m+1,0).getDate();
    const keys = Array.from({length:daysInMonth}, (_,i) => dateKey(new Date(y,m,i+1)));
    Promise.all(keys.map(k => new Promise(res => loadVal(k, v => res({k,v}))))).then(results => {
      const map = {}; results.forEach(r => { map[r.k] = r.v; });
      const c = document.getElementById("calContent");
      c.innerHTML = "";
      const grid = document.createElement("div");
      grid.className = "month-grid";
      DAYS_TR.forEach(d => {
        const h = document.createElement("div");
        h.className = "month-dow"; h.textContent = d;
        grid.appendChild(h);
      });
      const firstDay = new Date(y,m,1).getDay();
      const todayK = dateKey(new Date());
      for(let i=0;i<firstDay;i++) {
        const e=document.createElement("div"); e.className="month-cell empty"; grid.appendChild(e);
      }
      for(let d=1;d<=daysInMonth;d++) {
        const k = dateKey(new Date(y,m,d));
        const v = map[k];
        const cell = document.createElement("div");
        cell.className = "month-cell"+(v?" has-val":"")+(k===todayK?" today":"");
        if(v) {
          cell.style.background = COLOR_MAP[v]+"28";
          cell.style.boxShadow  = `inset 0 0 0 1px ${COLOR_MAP[v]}55`;
        }
        const dn=document.createElement("div"); dn.className="cell-day"; dn.textContent=d;
        cell.appendChild(dn);
        if(v) {
          const vn=document.createElement("div"); vn.className="cell-val";
          vn.style.color=COLOR_MAP[v]; vn.textContent=v;
          cell.appendChild(vn);
        }
        grid.appendChild(cell);
      }
      c.appendChild(grid);
    });
  }

  function renderYearView() {
    const y = calDate.getFullYear();
    document.getElementById("calPeriod").textContent = `${y}`;
    const allKeys = [];
    for(let m=0;m<12;m++) {
      const days=new Date(y,m+1,0).getDate();
      for(let d=1;d<=days;d++) allKeys.push(dateKey(new Date(y,m,d)));
    }
    Promise.all(allKeys.map(k => new Promise(res => loadVal(k, v => res({k,v}))))).then(results => {
      const map={}; results.forEach(r=>{if(r.v)map[r.k]=r.v;});
      const c=document.getElementById("calContent"); c.innerHTML="";
      const grid=document.createElement("div"); grid.className="year-grid";
      for(let m=0;m<12;m++) {
        const days=new Date(y,m+1,0).getDate();
        const ym=document.createElement("div"); ym.className="year-month";
        const mn=document.createElement("div"); mn.className="year-month-name";
        mn.textContent=MONTHS_TR[m].slice(0,3); ym.appendChild(mn);
        const dots=document.createElement("div"); dots.className="year-month-dots";
        for(let d=1;d<=days;d++) {
          const k=dateKey(new Date(y,m,d));
          const dot=document.createElement("div");
          const v=map[k];
          dot.className="ym-dot "+(v?"has-val":"empty-day");
          if(v) dot.style.background=COLOR_MAP[v];
          dot.title=k+(v?" → "+v:"");
          dots.appendChild(dot);
        }
        ym.appendChild(dots); grid.appendChild(ym);
      }
      c.appendChild(grid);
    });
  }

  // Popup calendar
  document.getElementById("openPopupBtn").addEventListener("click", openPopup);
  document.getElementById("calPopupBtn").addEventListener("click", openPopup);
  document.getElementById("popupClose").addEventListener("click", closePopup);
  document.getElementById("popupOverlay").addEventListener("click", e => {
    if(e.target===document.getElementById("popupOverlay")) closePopup();
  });
  document.getElementById("ppPrev").addEventListener("click", () => {
    ppDate.setMonth(ppDate.getMonth()-1); renderPopupCal();
  });
  document.getElementById("ppNext").addEventListener("click", () => {
    ppDate.setMonth(ppDate.getMonth()+1); renderPopupCal();
  });

  function openPopup() {
    ppDate = new Date(selectedDate);
    renderPopupCal();
    document.getElementById("popupOverlay").classList.add("show");
  }
  function closePopup() {
    document.getElementById("popupOverlay").classList.remove("show");
  }

  function renderPopupCal() {
    const y=ppDate.getFullYear(), m=ppDate.getMonth();
    document.getElementById("ppPeriod").textContent = `${MONTHS_TR[m]} ${y}`;
    const grid=document.getElementById("ppGrid"); grid.innerHTML="";
    DAYS_TR.forEach(d => {
      const h=document.createElement("div"); h.className="popup-dow"; h.textContent=d;
      grid.appendChild(h);
    });
    const firstDay=new Date(y,m,1).getDay();
    const days=new Date(y,m+1,0).getDate();
    const todayK=dateKey(new Date()), selK=dateKey(selectedDate);
    for(let i=0;i<firstDay;i++){
      const e=document.createElement("div"); e.className="popup-cell empty"; grid.appendChild(e);
    }
    for(let d=1;d<=days;d++){
      const date=new Date(y,m,d), k=dateKey(date);
      const cell=document.createElement("div");
      cell.className="popup-cell"+(k===todayK?" today":"")+(k===selK?" selected":"");
      cell.textContent=d;
      cell.addEventListener("click", ()=>{
        selectedDate=new Date(date);
        updateDateNav();
        calDate=new Date(selectedDate);
        refreshCal();
        closePopup();
      });
      grid.appendChild(cell);
    }
  }

  // Init
  calDate=new Date(selectedDate);
  updateDateNav();
  refreshCal();
</script>
</body>
</html>
