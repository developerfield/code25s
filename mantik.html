<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantık Sembolleri Referans Tablosu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
<style>
  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --aged: #e8dfc8;
    --gold: #c8a84b;
    --rust: #8b3a2a;
    --teal: #1e5c5c;
    --muted: #6b5e4a;
    --rule: #c8a84b44;
    --shadow: rgba(26,20,16,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--aged);
    color: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 40px 20px 60px;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(200,168,75,0.08) 27px,
        rgba(200,168,75,0.08) 28px
      );
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(200,168,75,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(139,58,42,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 2px solid var(--gold);
    position: relative;
  }

  header::after {
    content: '✦';
    position: absolute;
    bottom: -13px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--aged);
    padding: 0 12px;
    color: var(--gold);
    font-size: 18px;
  }

  .konu {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.15;
    margin-bottom: 8px;
  }

  h1 em {
    color: var(--rust);
    font-style: italic;
  }

  .subtitle {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 17px;
  }

  .section {
    margin-bottom: 36px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 2px 16px var(--shadow), 0 0 0 1px rgba(200,168,75,0.08);
    animation: fadeUp 0.5s ease both;
  }

  .section:nth-child(1) { animation-delay: 0.05s; }
  .section:nth-child(2) { animation-delay: 0.1s; }
  .section:nth-child(3) { animation-delay: 0.15s; }
  .section:nth-child(4) { animation-delay: 0.2s; }
  .section:nth-child(5) { animation-delay: 0.25s; }
  .section:nth-child(6) { animation-delay: 0.3s; }
  .section:nth-child(7) { animation-delay: 0.35s; }
  .section:nth-child(8) { animation-delay: 0.4s; }
  .section:nth-child(9) { animation-delay: 0.45s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 22px;
    background: linear-gradient(90deg, var(--ink) 0%, #2c2318 100%);
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }

  .section-header:hover { background: linear-gradient(90deg, #2c2318 0%, #3a2e1e 100%); }

  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    opacity: 0.7;
    min-width: 24px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--paper);
    font-weight: 400;
    letter-spacing: 0.04em;
    flex: 1;
  }

  .section-icon {
    font-size: 16px;
    color: var(--gold);
    opacity: 0.8;
  }

  .chevron {
    color: var(--gold);
    font-size: 12px;
    transition: transform 0.3s ease;
    opacity: 0.7;
  }

  .section.collapsed .chevron { transform: rotate(-90deg); }
  .section.collapsed .table-wrap { display: none; }

  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
  }

  thead th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 22px;
    text-align: left;
    background: rgba(200,168,75,0.06);
    border-bottom: 1px solid var(--rule);
    font-weight: 400;
  }

  tbody tr {
    border-bottom: 1px solid rgba(200,168,75,0.12);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(200,168,75,0.07); }

  td {
    padding: 11px 22px;
    vertical-align: middle;
  }

  .col-symbol {
    width: 80px;
    text-align: center;
  }

  .col-latex {
    width: 200px;
  }

  .sym {
    font-size: 22px;
    color: var(--rust);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
  }

  .sym .MathJax { font-size: 20px !important; color: var(--rust); }

  .latex-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--teal);
    background: rgba(30,92,92,0.07);
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid rgba(30,92,92,0.12);
    display: inline-block;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .latex-code:hover {
    background: rgba(30,92,92,0.14);
    border-color: rgba(30,92,92,0.25);
  }

  .latex-code.copied {
    background: rgba(200,168,75,0.15);
    border-color: var(--gold);
    color: #7a5c10;
  }

  .col-name {
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    color: var(--ink);
  }

  .col-desc {
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
  }

  .alt-names {
    font-size: 12px;
    color: var(--muted);
    opacity: 0.7;
  }

  .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
    letter-spacing: 0.05em;
    vertical-align: middle;
  }

  .tag-dig { background: rgba(139,58,42,0.1); color: var(--rust); border: 1px solid rgba(139,58,42,0.2); }
  .tag-modal { background: rgba(30,92,92,0.1); color: var(--teal); border: 1px solid rgba(30,92,92,0.2); }
  .tag-set { background: rgba(200,168,75,0.15); color: #7a5c10; border: 1px solid rgba(200,168,75,0.3); }

  footer {
    text-align: center;
    padding-top: 32px;
    margin-top: 8px;
    border-top: 1px solid var(--rule);
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 13px;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--ink);
    color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 4px;
    border: 1px solid var(--gold);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 600px) {
    .col-desc, thead th:last-child, td:last-child { display: none; }
    td { padding: 10px 14px; }
    .sym { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="page">

<header>
  <div class="konu">Mantık &amp; Sembolik Gösterim</div>
  <h1>Mantık <em>Sembolleri</em></h1>
  <div class="subtitle">Kapsamlı Referans Tablosu &mdash; LaTeX Kodları ile</div>
</header>

<div id="sections"></div>

<footer>
  Sembollere tıklayarak LaTeX kodunu panoya kopyalayabilirsiniz &middot; MathJax ile işlenmiştir
</footer>

</div>
<div class="toast" id="toast">Kopyalandı!</div>

<script>
const DATA = [
  {
    title: "Temel Bileşenler",
    icon: "◈",
    rows: [
      { sym: "p", latex: "p", name: "Önerme değişkeni p", desc: "Basit mantıksal değişken" },
      { sym: "q", latex: "q", name: "Önerme değişkeni q", desc: "Basit mantıksal değişken" },
      { sym: "r", latex: "r", name: "Önerme değişkeni r", desc: "Basit mantıksal değişken" },
      { sym: "s", latex: "s", name: "Önerme değişkeni s", desc: "Basit mantıksal değişken" },
      { sym: "1", latex: "1", name: "Doğru (1)", desc: "Boolean 1, Yüksek seviye" },
      { sym: "0", latex: "0", name: "Yanlış (0)", desc: "Boolean 0, Düşük seviye" },
      { sym: "D", latex: "D", name: "D değişkeni", desc: "Gecikme / flip-flop girişi" },
      { sym: "Y", latex: "Y", name: "Y değişkeni", desc: "Çıkış değişkeni" },
      { sym: "⊤", latex: "\\top", name: "Tautoloji / Doğru", desc: "Her zaman doğru olan sabit" },
      { sym: "⊥", latex: "\\perp", name: "Çelişki / Yanlış", desc: "Her zaman yanlış olan sabit" },
      { sym: "≡", latex: "\\equiv", name: "Eşdeğerlik", desc: "Mantıksal eşdeğerlik" },
    ]
  },
  {
    title: "Mantıksal Bağlaçlar",
    icon: "⊕",
    rows: [
      { sym: "∧", latex: "\\land", name: "Ve (Konjünksiyon)", desc: "p ∧ q : p ve q" },
      { sym: "∨", latex: "\\lor", name: "Veya (Ayrışım)", desc: "p ∨ q : p veya q" },
      { sym: "¬", latex: "\\neg", name: "Değil (Negasyon)", desc: "¬p : p değil" },
      { sym: "p'", latex: "p'", name: "Tümleyen", desc: "p' : p'nin tümleyeni" },
      { sym: "⇒", latex: "\\Rightarrow", name: "Koşul / İçerim", desc: "p ⇒ q : p ise q" },
      { sym: "⟺", latex: "\\Leftrightarrow", name: "Çift Koşul", desc: "p ⟺ q : p ancak ve ancak q" },
      { sym: "p⊻q", latex: "\\underline{\\lor}", name: "Dışlayıcı Veya (XOR)", desc: "Tam olarak biri doğru" },
      { sym: "⊕", latex: "\\oplus", name: "XOR (Modüler Toplam)", desc: "Dışlayıcı veya operatörü" },
    ]
  },
  {
    title: "Dijital / Teknik Bağlaçlar",
    icon: "⊼",
    tag: "dig",
    rows: [
      { sym: "⊼", latex: "\\bar{\\land}", name: "NAND", desc: "p NAND q = ¬(p ∧ q)" },
      { sym: "⊽", latex: "\\bar{\\lor}", name: "NOR", desc: "p NOR q = ¬(p ∨ q)" },
      { sym: "↑", latex: "\\uparrow", name: "Sheffer Çizgisi (NAND)", desc: "Sheffer'in NAND operatörü" },
      { sym: "↓", latex: "\\downarrow", name: "Peirce Oku (NOR)", desc: "Peirce'in NOR operatörü" },
      { sym: "|", latex: "\\mid", name: "Şart / Orta çizgi", desc: "NAND gösterimi veya koşul" },
      { sym: "x̄", latex: "\\overline{x}", name: "Komplement (NOT)", desc: "x çubuğu, dijital NOT kapısı" },
    ]
  },
  {
    title: "Nicelikleyiciler",
    icon: "∀",
    rows: [
      { sym: "∀", latex: "\\forall", name: "Evrensel Nicelikleyici", desc: "Her x için / Hepsi için" },
      { sym: "∃", latex: "\\exists", name: "Varoluşsal Nicelikleyici", desc: "En az bir x vardır ki" },
      { sym: "∃!", latex: "\\exists!", name: "Tekil Varoluş", desc: "Tam olarak bir x vardır ki" },
      { sym: "∄", latex: "\\nexists", name: "Yokluk Nicelikleyicisi", desc: "Hiçbir x yoktur ki" },
    ]
  },
  {
    title: "İspat ve Çıkarım",
    icon: "∴",
    rows: [
      { sym: "∴", latex: "\\therefore", name: "Sonuç olarak", desc: "Bu nedenle / dolayısıyla" },
      { sym: "∵", latex: "\\because", name: "Çünkü / Zira", desc: "Nedeni / gerekçesi" },
      { sym: "⊢", latex: "\\vdash", name: "Sentaktik Türetme", desc: "A, B'yi ispat eder" },
      { sym: "⊣", latex: "\\dashv", name: "Ters Türetme", desc: "Adjoint / sol türetme" },
      { sym: "⊨", latex: "\\models", name: "Semantik Sonuç", desc: "A, B'yi gerektirer (modeller)" },
      { sym: "⊩", latex: "\\Vdash", name: "Kuvvetli Türetme", desc: "Zorla ispat ilişkisi" },
      { sym: "⊭", latex: "\\nvDash", name: "Model Değil", desc: "Semantik sonuç değil" },
      { sym: "⊬", latex: "\\nvdash", name: "Türetilemez", desc: "Sentaktik türetme başarısız" },
    ]
  },
  {
    title: "Modal Mantık",
    icon: "□",
    tag: "modal",
    rows: [
      { sym: "□", latex: "\\square", name: "Zorunluluk", desc: "□p : p zorunlu olarak doğrudur" },
      { sym: "◇", latex: "\\lozenge", name: "Olasılık", desc: "◇p : p mümkündür" },
      { sym: "○", latex: "\\bigcirc", name: "Bir Sonraki (Zaman)", desc: "Temporal mantık: sonraki adım" },
      { sym: "◆", latex: "\\diamond", name: "Dolu Elmas", desc: "Olasılık / erişilebilirlik" },
    ]
  },
  {
    title: "Küme ve İlişki",
    icon: "∈",
    tag: "set",
    rows: [
      { sym: "∈", latex: "\\in", name: "Eleman", desc: "x ∈ A : x, A'nın elemanı" },
      { sym: "∉", latex: "\\notin", name: "Eleman Değil", desc: "x ∉ A : x, A'nın elemanı değil" },
      { sym: "⊂", latex: "\\subset", name: "Öz Alt Küme", desc: "A ⊂ B : A, B'nin öz alt kümesi" },
      { sym: "⊆", latex: "\\subseteq", name: "Alt Küme veya Eşit", desc: "A ⊆ B : A, B'nin alt kümesi" },
      { sym: "∪", latex: "\\cup", name: "Birleşim", desc: "A ∪ B : A ve B'nin birleşimi" },
      { sym: "∩", latex: "\\cap", name: "Kesişim", desc: "A ∩ B : A ve B'nin kesişimi" },
      { sym: "∖", latex: "\\setminus", name: "Fark", desc: "A ∖ B : A ve B farkı" },
      { sym: "△", latex: "\\Delta", name: "Simetrik Fark", desc: "A △ B : simetrik fark" },
      { sym: "∅", latex: "\\varnothing", name: "Boş Küme", desc: "Hiç elemanı olmayan küme" },
      { sym: "℘", latex: "\\wp", name: "Weierstrass P", desc: "Güç kümesi gösterimi" },
      { sym: "𝒫", latex: "\\mathcal{P}", desc: "𝒫(A) : A'nın güç kümesi", name: "Güç Kümesi" },
    ]
  },
  {
    title: "Tanım ve Sonuç",
    icon: "≔",
    rows: [
      { sym: "≔", latex: "\\coloneqq", name: "Tanımla", desc: "A ≔ B : A, B olarak tanımlanır" },
      { sym: "⟹", latex: "\\implies", name: "İçerim (Geniş)", desc: "p ⟹ q : p, q'yu içerir" },
      { sym: "⟺", latex: "\\iff", name: "Bikoşul (Geniş)", desc: "p ⟺ q : p ancak ve ancak q" },
      { sym: "→", latex: "\\rightarrow", name: "Koşullu Ok", desc: "p → q : eğer p ise q" },
      { sym: "↔", latex: "\\leftrightarrow", name: "Çift Yönlü Ok", desc: "p ↔ q : bikoşul" },
      { sym: "■", latex: "\\blacksquare", name: "İspat Sonu (Q.E.D.)", desc: "İspat tamamlandı (dolu)" },
      { sym: "□", latex: "\\square", name: "İspat Sonu (Açık)", desc: "İspat tamamlandı (açık)" },
      { sym: "Q.E.D.", latex: "\\text{Q.E.D.}", name: "Quod Erat Demonstrandum", desc: "Gösterilmek istenen bu idi" },
    ]
  },
  {
    title: "Özel Durumlar",
    icon: "∶",
    rows: [
      { sym: ":", latex: ":", name: "İki Nokta", desc: "Oranlar, tanım veya koşul bağlamı" },
      { sym: "∶", latex: "\\colon", name: "Kolon (Matematik)", desc: "Fonksiyon gösterimi f : A → B" },
    ]
  }
];

function buildSections() {
  const container = document.getElementById('sections');
  DATA.forEach((sec, i) => {
    const div = document.createElement('div');
    div.className = 'section';

    const tagHTML = sec.tag ? `<span class="tag tag-${sec.tag}">${sec.tag.toUpperCase()}</span>` : '';

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection(this)">
        <span class="section-num">${String(i+1).padStart(2,'0')}</span>
        <span class="section-title">${sec.icon} ${sec.title}${tagHTML}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-symbol">Sembol</th>
              <th class="col-latex">LaTeX Kodu</th>
              <th class="col-name">Ad</th>
              <th class="col-desc">Açıklama</th>
            </tr>
          </thead>
          <tbody>
            ${sec.rows.map(r => `
              <tr>
                <td class="col-symbol">
                  <div class="sym">\\(${r.latex.replace(/\\/g,'\\').replace(/'/g, "'")}\\)</div>
                </td>
                <td class="col-latex">
                  <code class="latex-code" onclick="copyLatex(this,'${r.latex.replace(/'/g,"\\'")}')">${r.latex}</code>
                </td>
                <td class="col-name">${r.name}</td>
                <td class="col-desc">${r.desc}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
    container.appendChild(div);
  });
}

function toggleSection(header) {
  header.parentElement.classList.toggle('collapsed');
}

let toastTimer;
function copyLatex(el, code) {
  const full = '$' + code + '$';
  navigator.clipboard.writeText(full).catch(() => {});
  el.classList.add('copied');
  el.textContent = '✓ kopyalandı';
  setTimeout(() => {
    el.classList.remove('copied');
    el.textContent = code;
  }, 1600);

  const toast = document.getElementById('toast');
  toast.textContent = full + ' kopyalandı';
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

buildSections();
</script>
</body>
</html>
