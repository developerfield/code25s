<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parabol Kontrol</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent-a: #ff6b35;
    --accent-b: #00d4ff;
    --accent-c: #b5ff35;
    --text: #e8e8f0;
    --muted: #555570;
    --grid: #1a1a28;
  }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Header */
  header {
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
  }
  .formula-display {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .formula-display span { color: var(--text); font-weight: 700; }

  /* Canvas area */
  .canvas-wrapper {
    flex: 1;
    padding: 24px 32px 0;
    position: relative;
    min-height: 0;
  }

  canvas {
    display: block;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
  }

  /* Controls panel */
  .controls {
    padding: 24px 32px 28px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .slider-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .slider-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .slider-label.a { color: var(--accent-a); }
  .slider-label.b { color: var(--accent-b); }
  .slider-label.c { color: var(--accent-c); }

  .slider-value {
    font-size: 1.1rem;
    font-weight: 700;
    min-width: 54px;
    text-align: right;
  }
  .slider-value.a { color: var(--accent-a); }
  .slider-value.b { color: var(--accent-b); }
  .slider-value.c { color: var(--accent-c); }

  .slider-desc {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Custom slider */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    cursor: pointer;
    outline: none;
    transition: background 0.2s;
  }
  input[type="range"].a { background: linear-gradient(to right, var(--accent-a) 0%, var(--accent-a) var(--pct, 50%), var(--border) var(--pct, 50%)); }
  input[type="range"].b { background: linear-gradient(to right, var(--accent-b) 0%, var(--accent-b) var(--pct, 50%), var(--border) var(--pct, 50%)); }
  input[type="range"].c { background: linear-gradient(to right, var(--accent-c) 0%, var(--accent-c) var(--pct, 50%), var(--border) var(--pct, 50%)); }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    cursor: grab;
    transition: transform 0.15s;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
  }
  input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.25); }
  input[type="range"].a::-webkit-slider-thumb { background: var(--accent-a); box-shadow: 0 0 12px var(--accent-a); }
  input[type="range"].b::-webkit-slider-thumb { background: var(--accent-b); box-shadow: 0 0 12px var(--accent-b); }
  input[type="range"].c::-webkit-slider-thumb { background: var(--accent-c); box-shadow: 0 0 12px var(--accent-c); }

  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid var(--bg); cursor: grab;
  }
  input[type="range"].a::-moz-range-thumb { background: var(--accent-a); }
  input[type="range"].b::-moz-range-thumb { background: var(--accent-b); }
  input[type="range"].c::-moz-range-thumb { background: var(--accent-c); }

  .range-limits {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: -4px;
  }
</style>
</head>
<body>

<header>
  <h1>⬡ Parabol Kontrol</h1>
  <div class="formula-display" id="formulaDisplay">
    f(x) = <span id="fA">1.00</span>x² + <span id="fB">0.00</span>x + <span id="fC">0.00</span>
  </div>
</header>

<div class="canvas-wrapper">
  <canvas id="graph"></canvas>
</div>

<div class="controls">
  <!-- A -->
  <div class="slider-group">
    <div class="slider-header">
      <div>
        <div class="slider-label a">A — Açılım</div>
        <div class="slider-desc">Parabolün genişliği &amp; yönü</div>
      </div>
      <div class="slider-value a" id="valA">1.00</div>
    </div>
    <input type="range" class="a" id="sliderA" min="-5" max="5" step="0.05" value="1">
    <div class="range-limits"><span>−5</span><span>+5</span></div>
  </div>

  <!-- B -->
  <div class="slider-group">
    <div class="slider-header">
      <div>
        <div class="slider-label b">B — Yatay Kayma</div>
        <div class="slider-desc">Tepe noktası yatay konumu</div>
      </div>
      <div class="slider-value b" id="valB">0.00</div>
    </div>
    <input type="range" class="b" id="sliderB" min="-10" max="10" step="0.1" value="0">
    <div class="range-limits"><span>−10</span><span>+10</span></div>
  </div>

  <!-- C -->
  <div class="slider-group">
    <div class="slider-header">
      <div>
        <div class="slider-label c">C — Dikey Kayma</div>
        <div class="slider-desc">Y eksenini kesim noktası</div>
      </div>
      <div class="slider-value c" id="valC">0.00</div>
    </div>
    <input type="range" class="c" id="sliderC" min="-10" max="10" step="0.1" value="0">
    <div class="range-limits"><span>−10</span><span>+10</span></div>
  </div>
</div>

<script>
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');

let a = 1, b = 0, c = 0;
let animA = 1, animB = 0, animC = 0;
let raf;

function resize() {
  const wrapper = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const w = wrapper.clientWidth - 64;
  const h = Math.min(Math.max(window.innerHeight * 0.52, 260), 500);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
}

function lerp(a, b, t) { return a + (b - a) * t; }

function draw() {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width / dpr;
  const H = canvas.height / dpr;

  // Smooth animation
  animA = lerp(animA, a, 0.09);
  animB = lerp(animB, b, 0.09);
  animC = lerp(animC, c, 0.09);

  ctx.clearRect(0, 0, W, H);

  const pad = 36;
  const gw = W - pad * 2;
  const gh = H - pad * 2;
  const cx = pad + gw / 2;
  const cy = pad + gh / 2;
  const scaleX = gw / 20; // -10 to +10
  const scaleY = gh / 20; // -10 to +10

  // Background
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.lineWidth = 1;
  for (let i = -10; i <= 10; i++) {
    const x = cx + i * scaleX;
    const y = cy + i * scaleY;
    ctx.strokeStyle = i === 0 ? '#252535' : '#141422';
    ctx.beginPath(); ctx.moveTo(x, pad); ctx.lineTo(x, pad + gh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(pad + gw, y); ctx.stroke();
  }

  // Axes
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#2a2a40';
  ctx.beginPath(); ctx.moveTo(cx, pad - 4); ctx.lineTo(cx, pad + gh + 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad - 4, cy); ctx.lineTo(pad + gw + 4, cy); ctx.stroke();

  // Axis tick labels
  ctx.fillStyle = '#333350';
  ctx.font = '10px Space Mono, monospace';
  ctx.textAlign = 'center';
  for (let i = -10; i <= 10; i += 2) {
    if (i === 0) continue;
    ctx.fillText(i, cx + i * scaleX, cy + 14);
    ctx.textAlign = 'right';
    ctx.fillText(-i, cx - 16, cy + i * scaleY + 3);
    ctx.textAlign = 'center';
  }

  // Arrow heads
  ctx.fillStyle = '#2a2a40';
  ctx.beginPath(); ctx.moveTo(cx, pad - 10); ctx.lineTo(cx - 5, pad); ctx.lineTo(cx + 5, pad); ctx.fill();
  ctx.beginPath(); ctx.moveTo(pad + gw + 10, cy); ctx.lineTo(pad + gw, cy - 5); ctx.lineTo(pad + gw, cy + 5); ctx.fill();
  ctx.fillStyle = '#333350';
  ctx.font = '11px Syne, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('y', cx + 12, pad - 4);
  ctx.fillText('x', pad + gw + 16, cy + 4);

  // Vertex line (dashed)
  const vx = -animB / (2 * (animA || 0.001));
  const vy = animC - (animB * animB) / (4 * (animA || 0.001));
  const vPixX = cx + vx * scaleX;
  const vPixY = cy - vy * scaleY;

  if (vPixX >= pad && vPixX <= pad + gw) {
    ctx.setLineDash([4, 6]);
    ctx.strokeStyle = 'rgba(255,107,53,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(vPixX, pad); ctx.lineTo(vPixX, pad + gh); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Parabola glow (shadow pass)
  ctx.save();
  ctx.shadowBlur = 20;
  ctx.shadowColor = animA >= 0 ? 'rgba(0,212,255,0.5)' : 'rgba(181,255,53,0.5)';
  ctx.beginPath();
  let started = false;
  for (let px = pad; px <= pad + gw; px++) {
    const xVal = (px - cx) / scaleX;
    const yVal = animA * xVal * xVal + animB * xVal + animC;
    const py = cy - yVal * scaleY;
    if (py < pad - 20 || py > pad + gh + 20) { started = false; continue; }
    if (!started) { ctx.moveTo(px, py); started = true; }
    else ctx.lineTo(px, py);
  }
  ctx.strokeStyle = animA >= 0 ? 'rgba(0,212,255,0.15)' : 'rgba(181,255,53,0.15)';
  ctx.lineWidth = 8;
  ctx.stroke();
  ctx.restore();

  // Parabola main curve
  ctx.beginPath();
  started = false;
  for (let px = pad; px <= pad + gw; px++) {
    const xVal = (px - cx) / scaleX;
    const yVal = animA * xVal * xVal + animB * xVal + animC;
    const py = cy - yVal * scaleY;
    if (py < pad - 20 || py > pad + gh + 20) { started = false; continue; }
    if (!started) { ctx.moveTo(px, py); started = true; }
    else ctx.lineTo(px, py);
  }
  const grad = ctx.createLinearGradient(pad, 0, pad + gw, 0);
  grad.addColorStop(0, '#ff6b35');
  grad.addColorStop(0.5, '#00d4ff');
  grad.addColorStop(1, '#b5ff35');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Vertex point
  if (vPixX >= pad && vPixX <= pad + gw && vPixY >= pad && vPixY <= pad + gh) {
    ctx.beginPath();
    ctx.arc(vPixX, vPixY, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(vPixX, vPixY, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = '#00d4ff';
    ctx.fill();
    // Vertex label
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '10px Space Mono, monospace';
    ctx.textAlign = 'left';
    const lx = vPixX + 8, ly = vPixY - 8;
    ctx.fillText(`(${vx.toFixed(2)}, ${vy.toFixed(2)})`, lx, ly);
  }

  raf = requestAnimationFrame(draw);
}

function updateSlider(slider) {
  const min = parseFloat(slider.min);
  const max = parseFloat(slider.max);
  const val = parseFloat(slider.value);
  const pct = ((val - min) / (max - min) * 100).toFixed(1) + '%';
  slider.style.setProperty('--pct', pct);
}

function updateAll() {
  a = parseFloat(document.getElementById('sliderA').value);
  b = parseFloat(document.getElementById('sliderB').value);
  c = parseFloat(document.getElementById('sliderC').value);

  document.getElementById('valA').textContent = a.toFixed(2);
  document.getElementById('valB').textContent = b.toFixed(2);
  document.getElementById('valC').textContent = c.toFixed(2);

  document.getElementById('fA').textContent = a.toFixed(2);
  document.getElementById('fB').textContent = (b >= 0 ? '+' : '') + b.toFixed(2);
  document.getElementById('fC').textContent = (c >= 0 ? '+' : '') + c.toFixed(2);

  updateSlider(document.getElementById('sliderA'));
  updateSlider(document.getElementById('sliderB'));
  updateSlider(document.getElementById('sliderC'));
}

['sliderA', 'sliderB', 'sliderC'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateAll);
});

window.addEventListener('resize', () => { cancelAnimationFrame(raf); resize(); draw(); });
resize();
updateAll();
draw();
</script>
</body>
</html>
